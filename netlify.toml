# Netlify configuration for NEXUS-SENTRY Web

[build]
  command = "cd apps/web && pnpm install && pnpm build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://your-api-domain.com/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.headers]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"