services:
  - name: nexus-sentry-api
    type: web
    env: node
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
    autoDeploy: true