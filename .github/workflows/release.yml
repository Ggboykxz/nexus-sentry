name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## NEXUS-SENTRY ${{ github.ref_name }}
            
            Run with Docker:
            ```bash
            docker compose -f docker/docker-compose.yml up
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}