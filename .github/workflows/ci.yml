name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api -f docker/Dockerfile.api .

      - name: Build Web image
        run: docker build -t web -f docker/Dockerfile.web .

      - name: List images
        run: docker images | grep -E "api|web"