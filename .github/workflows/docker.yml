name: Docker

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          load: true

      - name: Build Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.web
          load: true

      - name: List images
        run: docker images